name: Keep signing app awake

# Pings the public signing app on a schedule so Streamlit Community Cloud's
# free tier never puts it to sleep -- a client (or Sydney) opening a signing
# link always lands on the live contract, not the "app is waking up" screen.
# Runs on GitHub's servers (free for public repos), independent of Sydney's Mac.

on:
  schedule:
    - cron: "*/5 * * * *"   # every 5 min (GitHub may delay under load; still keeps it warm)
  workflow_dispatch: {}      # allow a manual run from the Actions tab

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping the signing app
        run: |
          URL="https://studio-os-sign-vpeu9hkzcvg3epn87tmilf.streamlit.app/"
          for i in 1 2 3 4 5 6; do
            # no -L: a raw GET returns Streamlit's own code (200 when awake,
            # 303 redirect otherwise) -- either means the server was reached,
            # which is the traffic that keeps it warm.
            code=$(curl -s -o /dev/null -w "%{http_code}" --max-time 45 "$URL" || echo "000")
            echo "attempt $i: HTTP $code"
            case "$code" in 2*|3*) echo "app reached (keeping it warm)"; exit 0;; esac
            sleep 15
          done
          echo "no response yet; the pings above still trigger the wake"
